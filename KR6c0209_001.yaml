body:
  text: 姚秦三藏法師鳩摩羅什譯陳隋天台智者大師疏閩建州後學沙門道霈合大科分二一經前玄義二入文解釋今初大師於諸經前例作五重玄義一釋名二辨體三明宗四論用五判教此經以人法為名實相為體自行因果為宗權實二智為用大乘熟酥為教相第一釋名所言名者有通有別經之一字通諸部也佛說仁王護國般若波羅蜜者別也又佛說仁王護國別此部也般若波羅蜜通諸部也然諸經立名不同或單就法如涅槃經或單就人如阿彌陀經或單從譬如梵網經或人法兩題如淨名及此經或法喻雙舉如法華經或三具足如華嚴經所言佛者具德之義自覺異凡覺他異聖覺滿異菩薩八音宣暢名說此能說之人也仁王下名所說之法施恩布德故名為仁統化自在故稱為王仁王是能護國土是所護由仁王以道治國故也若望般若般若是能護仁王是所護以持般若故仁王安隱若以王能傳法則王是能護般若是所護也又仁者忍也聞善不即喜聞惡不即怒能含忍於善惡故云忍也王者統也四方歸統故也此因緣釋約教則見諸法生知生是實見諸法滅滅則是空空則六塵等國不動不轉故三界結盡則王安隱此二乘所得名為仁王三藏意也於凡聖同居土而得自在若觀諸法色即是空不生不滅如幻如化三界煩惱一時頓斷住於界外化城之中生已度想生安隱想則是三乘之人共行十地能護方便有餘化城之國各得稱王此通教意若觀諸法空即是色色無邊故般若等法亦復無邊雖復無邊而與心不相妨礙如函大葢大而無邊之法在一心中一一法中具諸佛法從於初地乃至妙覺分分圓滿住蓮華臺不動不轉能動能轉即十地菩薩住檀等六各各為王此別教意也若觀諸法本來不生今則無滅雖無生滅生滅宛然雙炤雙亡契乎中道廣大如法界究竟若虗空即從初住乃至佛地四十二心分分明證中道之理住常寂光各得稱王此圓教意也又三藏中羅漢支佛煩惱盡故得稱仁王菩薩及果向忍見思未盡但名王不名仁也通教佛地別教妙覺圓教極果各是仁王當教自有優劣若非仁則是王也若約本迹即三教之仁王為迹圓教之仁王為本分論本迹則圓教十行能為別教之本通教佛地即是別教之迹三藏二乘復是通教中本展轉當教各有本迹云云觀心者觀生滅法見色是有析之至空心於色上而得自在此生滅觀心仁王也觀色即是空空色自在此無生觀心仁王也若觀空即是色次第而入中道正觀此無量觀心仁王也若觀色空空色不二而二二而無二雙炤雙亡此是實相一心三觀三觀一心如彼天目不縱不橫而得自在此圓教觀心仁王也我今聖主道化無方子育蒼生仁恩普洽恒以三觀安隱色心迹尚叵窮本誠難究矣般若者此云智慧即智論四十二卷中釋也開善藏法師並用此說論第七十又有一解云般若不可稱般若甚深極重智慧輕薄是故不能稱莊嚴旻師以此文說般若名含眾義智慧唯是一門非正翻譯詳二師說各成諍兢今為通之夫般若者自有二種一實二權權即可翻實則不可實則圓教權則前三又權不可翻即三藏實色不可令色即是空實即可翻即三智也通教一切智別教道種智圓教一切種智豈可各固一見以局大方火炎不可取實當有在也然智與慧經論解殊成實合釋云真慧名智即慧是智也淨名離說知一切眾生心念如應說法起於智業不取不捨入一相門起於慧業者釋云智是有慧是空有智故不住空有慧故不住有今此般若具翻八部有人云天王一部即仁王部攝此解不可若如大經中明人王亦天王斯則可也問人仁字別云何取同答大經云有仁恩故名之為人老經云聖人不仁以百姓為蒭狗故知人王行仁不求恩報若背道之主但人非仁順道之主是人亦仁問仁義云何答以字論義理則易明上一表天德下一表地德立人表人德聖主道侔造化德合三才故云仁王也問古人云仁王經非正傳譯是事云何答寡識小智深可憐憫豈有不見目錄即云非是正翻海庸不信山木似魚夏革亦云古初無物嗚呼盲目誚玻瓈珠且準下經自有兩本一廣說如散華品云爾時十六大國王聞佛所說十萬億偈般若波羅蜜散華供養二者略本即今經文譯者不同前後三本一者晉時永嘉年月支三藏曇摩羅察晉云法護翻出二卷名仁王般若二是偽秦弘始三年鳩摩羅什於長安逍遙園別舘翻二卷名佛說仁王護國般若波羅蜜三者梁時真諦大同年於豫章實因寺翻出一卷名仁王般若經疏有六卷雖有三本秦為周悉依費長房入藏目錄云耳波羅蜜者此云事究竟亦云到彼岸生死為此涅槃為彼煩惱為中流六度為船筏此因緣釋也三藏實有為此實有滅為彼見思為中流八正為船通教以色為此即空為彼見思為中流六度為船別教以色空為此空即是色為彼無明為中流無量行為船圓教以色空空色不二而二為此二而無二為彼無明為中流一行無量行無量行一行為船隨前諸教而度云到彼岸此約教釋也空觀觀色即空及色滅空雖有巧拙同斷見思而論彼此假觀觀三假得理論彼此中觀十信已前十住已後論彼此此觀心釋也經有翻無翻各具五義廣如法華玄云云約教六塵俱經經云或以光明而作佛事即色塵為經或以音聲而作佛事即聲為經或以飯香而作佛事即香塵經食飯入津即味塵經搖脣動舌即觸塵經寂然無聲諸菩薩等得入三昧即法塵經一一塵根各有約教本迹觀心釋也又但以文字為經心行為緯能成正覺之匹帛故取世經以喻焉第二辨體有人云文義為體此通說也有云無相為體者四教皆有無相無相永漫亦通說也有云以五忍十地為體如下經云五忍是菩薩法具列五忍竟結云名為諸佛菩薩脩般若波羅蜜故知因脩般若證五忍一切佛菩薩無不由五忍而成聖故以五忍十地為體今則不然先釋體字體者法也各親其親各子其子君臣撙節若無體者則非法也出世間法亦復如是善惡凡聖菩薩佛一切不出法性正指實相為體普賢觀云大乘因者諸法實相大乘果者亦諸法實相實相即法性依此法性因得法性果故知此經以實相為體若別論之般若二種一共二乘人說二者不共準此實相亦有二種一共二不共共者但見於空不見不空不斷無明但除見思此偏真實相不共者名中道實相別教地前次第脩初地方證圓教一心從初住乃至佛果皆名圓證若論權實即共者是化他之權不共者是自行之實云云約教即般若是通唯無三藏有三乘共行十地有別入通有圓入通通正二旁即通別是權圓教是實此經雖具三教正以圓實相為體也第三明宗宗者要也所謂佛自行因果以為宗也有以無生正觀為宗離有無二邊假云中道故下文云般若無知無見不行不受不生不滅此通教意但得於權而失於實今以佛自行因果以為宗要令諸聞者欣樂增脩一色一香無非般若般若真智離有離無雖離有無有無宛然雖復宛然只自無相故以無相因果以為宗也問宗與體何異答宗如綱裘體如毛目振裘毛舉動綱目起宗體之義若此又如釵釧金銀是體匠者造之是宗今實相之理是體脩因得果為宗也云云第四辨用用者力用也有人云此經以內外二護為用內護者下文云為諸菩薩說護佛果因緣護十地行因緣言外護者下文云吾今為汝說護國因緣令國土獲安七難不起災害不生萬民安樂名外護也此但得一俗一真真又不定通別圓皆有十地為護何者十地故不可全依今以諸佛二智為力用以諸如來皆以實智自炤權智炤他然此經有三種權實通別雖有實智亦名為權圓教雖復有權亦總稱實以圓教是佛自行二智炤理即鑒機鑒機即炤理如薩婆悉達彎祖王弓滿名為力穿七鐵鼓貫一鐵圍山洞地徹水名為用通別力用微弱如凡人弓箭何者以通稟化他二智或等炤理不遍或次第方知不若圓教圓炤圓證故以圓中二智為用也即權智護同居有餘實報等國令七難不起實智護圓教四十二心之因果經云護十地行因緣此通約三教所行十地也云云第五明教相弘宣正法須識教之偏圓廣如法華玄義今略明之教者聖人被下之言也相者分別同異也此經部屬般若教通衍門是熟酥味經說護佛果及護十地行因緣又王問摩訶衍云何炤故知非三藏教明矣雖有八偈談無常生滅等事乃舉往昔百法師用小乘說世間不堅以勸普明捨國即屬助道非今經正說也經前玄義竟次入文解釋夫震旦講說不同或有分文或不分者只如大論釋大品不分科段天親涅槃即有分文道安別置序正流通劉虬但隨文解釋此亦人情蘭菊好樂不同意在達玄非存涉事今且依分文者序彰聖人說法必有由漸名序分正顯利益當時名正說分末世眾生同霑法利名流通分此經八品序品為序分觀空下六品為正說分囑累品為流通分若望經文受持品末佛告月光下即是流通分云云今初佛說仁王護國般若波羅蜜經序品第一佛說仁王護國般若波羅蜜經即一部之通稱序品第一即部內之別名也序者由也次也品者梵云䟦瞿此云品謂品類也義類相從即為一品第者欲令不亂一者義乃在初文分二一者證信二者發起亦名通序別序亦名如來序阿難序亦名經前序經後序六事證經名證信序起發正宗名發起序諸經通有名通序此經獨有名別序金口所說名如來序阿難證信名阿難序佛在時有名經前序集者所置名經後序今且依初從如是下至僉然而坐名證信序爾時十號下是發起序證信序者大智論云佛於俱夷那竭國薩羅雙樹林中北首臥將入涅槃爾時阿難親愛未除心沒憂海阿泥盧豆語阿難言汝守法藏人不應如凡自沒憂海佛將付汝法汝今愁悶失所受事汝當問佛佛般涅槃後我等云何行道誰當作師惡口車匿云何共住佛說經初置何等語阿難聞已悶心小醒於佛後臥床邊具以事問佛答依四念處住解脫經戒即是大師車匿比丘如梵天法治之若心須改教迦旃延經即可得道是我三僧祇所集法寶是初應置如是我聞一時佛在某方某國某處樹林中是我法門中初應如是說何者三世佛經皆有是語云云復次摩訶迦葉等問阿難佛初何處說法說何等法阿難答如是我聞一時佛在波羅奈國仙人鹿林為五比丘說苦聖諦爾時大眾聞者皆信具如智論第二云云為是事故有證信序云云文為六一如是舉所聞之法體二我聞明能持之阿難三一時明聞持和合感應道交四佛明說教之主五住王舍城下明說教之處六與大比丘眾下明同聞之眾今初如是如是者三世佛經皆安如是諸佛道同不與世諍此世界悉檀大論云舉時方令人生信事此為人悉檀破外道阿漚二字此對治悉檀肇云如是者信順之辭也信則所聞之理會順則師資之道成理會即第一義悉檀此四皆是因緣釋云云約教者佛明俗諦有文字真諦無文字阿難傳佛俗文不異名如因此俗文會真無非故名是此藏教經初如是也佛明即色是空空即是色色空空色無二無別空色不異為如即事而真為是此通教經初如是也佛說死生是有涅槃是無從死生有入涅槃無出涅槃無入於中道阿難傳之與佛無異此別教經初如是也佛說生死即涅槃即中道徧一切處無非佛法名如實相阿難傳此與佛無異為如如如不動名之為是此圓教經初如是也此經具三教三諦如是之義阿難傳之無錯無謬也二明能持之阿難我聞我聞者大論云耳根不壞聲在可聞處作心欲聞眾緣和合故言我聞我總耳別舉總攝別世界釋也阿難昇座口稱我聞大眾悲泣飛空說偈此為人也阿難昇座眾疑釋迦重起或阿難成佛或他方佛來若唱我聞三疑即遣此對治釋也阿難隨俗稱我聞第一義中我即無我聞即無聞不聞而聞不我而我此第一義釋也約教者釋論云凡夫三種謂見慢名字學人二種無學一種阿難是學人無邪我能伏慢我隨世名字稱我此三藏意也十住毗婆沙云四句稱我皆隨邪見佛正法中無我誰聞此通教意也大經云阿難多聞士自然能解了是我及無我知我無我二而不二雙分別我無我此別教意也若阿難知我無我不二而二二而無二方便為侍者傳佛智慧此圓教釋也正法念經有三阿難一阿難陀此云歡喜持小乘藏二阿難䟦陀此云歡喜賢持雜藏三阿難娑伽此云歡喜海持佛藏阿含有典藏阿難持菩薩藏葢指一人而具四德傳持四教其義分明觀心者有空觀假觀中道正觀即空者我即無我也即假者無我即我也即中者是真我也聞者阿難佛得道夜生侍佛二十餘年未侍佛時應是不聞大論云阿難展轉聞非是悉聞報恩經阿難乞四願未聞之法願佛重說胎藏經云佛從金棺出金色臂重為阿難現入胎出胎相諸經因此皆得稱聞法華云阿難得記即時憶念過去佛法令如現在前故一切稱聞因緣釋也若歡喜阿難面如淨滿月眼若青蓮華親承佛旨如仰完器盛水瀉之異缾一句無遺此持聞聞法也歡喜賢住學地得空無相願六根不漏持聞不聞法也典藏阿難多所含受如雲持雨此持不聞聞法也阿難海是多聞士自然能了常與無常等若知如來常不說法是名多聞佛法大海水流入阿難心此持不聞不聞法也此經具三教即阿難一人以三德傳持也云云三明聞持和合感應道交一時一時者肇云法王啟運之日大眾嘉會之時此世界釋時也大論云迦羅是實時示內弟子時食時著衣時者為人說時也三摩耶是假使除外道邪見者對治釋時也第一義中無時無不時廣明時義具如智論第一卷云云約教則見諦已上無學已下名下一時若三人同入第一義名中一時登地已上名上一時初住已上名上上一時今經初說即是通一時約別圓接入則具三時云云四明說教之主佛教主者佛也佛名為覺覺諸煩惱身心二病因果圓滿方能破縛劫初無病劫盡多病長壽時樂短壽時苦東天下富而壽西天下多牛羊北天下無我無人如此之處不能感佛八萬歲時南天下未見果而脩因乃至百歲時亦如是故佛出其地此世界釋也日若不出池中未生已生等華皆未現日出皆生佛若不出天人減少惡道增長佛若出世則有剎帝婆羅門居士四天王乃至有頂此為人釋也三乘根性感佛出世餘不能感若斷有頂種永度生死流此對治釋也佛於法性無動無出能令眾生感見動出而於如來實無動出此第一義說佛名覺者覺世間苦集覺出世道滅身長丈六壽年八十現比丘像三十四心樹下成佛者三藏盡尊自覺覺他也帶丈六像現尊特身樹下一念相應斷餘殘習即通佛自覺覺他也現尊特身坐蓮華臺受佛記者別佛自覺覺他隱前三相唯示不可思議如虗空相即圓教佛自覺覺他故像法決疑經云或見丈六之身或見小身大身或見坐蓮華臺為百千釋迦說心地法門或見身同虗空迹於法界無有分別即四佛義也本迹釋者三佛為迹一佛為本云云觀心釋者觀因緣所生法析之至無此三藏拙覺觀因緣即空此通教巧覺皆覺空也若先觀空次假後中此別教假覺也若觀諸法即空即假即中是圓覺也五明說教之處住王舍城耆闍崛山中先釋住次釋王城後釋山佛具三身住處有八應身四住一壽命住謂五分法身等二依止住謂王城耆山等三境界住謂三千界境四威儀住謂行立坐臥報身三住一者天住住六欲天二者梵住住四禪天三者聖住住空無相無願法身一住住第一義空云云約教者藏佛從析門發真知無漏住有餘無餘二涅槃通佛從體門發真住二涅槃別佛從次第門住祕密藏圓佛從不次第門住祕密藏二釋城具存梵音應云羅閱祇摩訶伽羅羅閱祇此云王舍摩訶此云大伽羅此云城國名摩伽陀此云不害人無亂殺法也亦云摩竭提此云天羅天羅者即班足之父昔久遠時此主千小國時王遊獵值牸獅子共王交通後月滿來王殿上生子王審知是子而作告令言我無子天賜我子養之長大足上班駁時人號為班足後紹王位喜多食肉一時遽闕仍取城西新死小兒以供王膳王大美之勅常準此廚人自後日殺一人毒流天下舉國咸怨千小國王舉兵伐之擯在五山羅剎翼輔而為鬼王因與山神誓殺千王方滿我願即以神力捉得諸王唯普明王後方捕至欲行屠害以祭山神時普明王悲啼泣恨而作是言生來實語而今乖信班足問言汝求何信普明答曰許行大施班足語言放汝行施事畢就我普明歡喜遠歸本國作大施會委政太子心安形悅匍匐就終班足問曰死門難向汝既得去何更自來時普明王廣與班足說慈悲心毀呰煞害仍示一切悉是無常班足聞信得空平等住於初地普集千王各取一渧血髮三條賽山神願尋與千王都五山中築城立舍為大國迭更知政千王住故故稱王舍又城中百姓七遍起舍七遍被燒唯王舍獨免太子命言自今以後雖百姓家悉稱王舍應免火難率土遂命便得免燒故百姓家盡稱王舍云云又亦云王赦因普明王放千王故稱王赦又此城四天王共造故稱王舍又摩伽陀王生一子一頭兩面四手以為不祥裂其身首欲棄艸野有羅剎女鬼名曰梨羅還合其身以乳養之年長成人力葢諸國取八萬四千王置五山內立城治化以多王住故稱王舍云云又摩伽陀者名持甘露處有十二城一區祇尼大城二富樓那䟦檀大城三阿監車多羅大城四弗羅婆大城五王舍大城六舍婆提大城七婆羅柰大城八迦毗羅大城九瞻婆城十婆翅多城十一拘睒彌城十二鳩樓城此十二城中後六少住前六多住又前六城中多住王舍城報法身恩故少住舍婆提城報生身恩故也舍者王舍城中有六精舍一竹園精舍在平地迦蘭陀長者之所造去城西北三十里二小力獨山精舍三七葉穴山精舍四天主穴山精舍五蛇神穴山精舍六耆闍崛山精舍耆闍崛山此翻靈鷲釋迦菩薩昔為鷲鳥於此山中養育父母由此得名故云靈鷲又王舍城南有屍陀林鷲鳥居之多食死人人欲死者鷲翔其家悲鳴作聲人以預知知人死故稱靈鷲又山有五峰東方象頭南方馬頭西方羊頭北方獅子頭中央鷲頭亦得名為鷲山也問佛何故偏於王城中向鷲山說法耶答依法華論云如王舍城勝於餘城耆闍崛山勝於餘山以佛在勝處故顯此法門勝也今此般若是最勝法故偏就王城耆山說也中者表說中道般若也第六明同聞之眾諸經列眾不出四種一者影響謂諸佛菩薩大果已圓為令正法久住世間故來影響二結緣眾見在雖聞而不獲益但作當來得道因緣也三發起眾法身菩薩更相發起請如來說共益眾生也四當機眾植因曠古果遂今生聞法之時即能悟入也比丘比丘尼優婆塞優婆夷等各有四義推之可解文為二初列眾二總結初文三一此土眾二他方眾三化眾初文三一聲聞眾二菩薩眾三雜類眾二乘著空故初列凡夫著有故後列菩薩常行中道故中列又聲聞心形兩勝故初菩薩心勝形劣故中凡夫心形俱劣故後初文二先聲聞次緣覺初文五一通號二列數三行位四歎德五總結今初與大比丘眾與者言共釋論云一時一處一戒一心一見一道一解脫也大者亦云多亦云勝皆阿羅漢故稱大數至八百萬億故言多勝諸異道故言勝比丘五義一名乞士清淨自活離四邪命二破煩惱見愛滅故三者名號如梵漢異相各有名號四者受具足戒故名比丘五者比之名能丘之名怖能怖煩惱賊故名比丘四人已上名之為眾云云二列數八百萬億三行位學無學皆阿羅漢既云有學無學云何皆云阿羅漢依成論云羅漢二種一住二行當知行者是學人住者是無學人故經云五戒賢者皆行阿羅漢即是學人又於此中一文先明德行即學無學以此人學於無學之行非是向義八人之中四向三果名學無學第八羅漢但名無學阿羅漢者翻三義一者不生無明糠脫後世田中更不受生故言不生二者殺賊九十八使煩惱盡故名為殺賊三者應供智願具足堪銷物供此藏通意也若就圓釋非但不生亦不生不生無漏是不生也非但殺賊亦殺不賊不賊者涅槃是也非但應供亦是供應一切眾生是供應也云云四嘆德有為功德無為功德無學十智有學八智有學六智三根十六心行法假虗實觀受假虗實觀名假虗實觀三空觀門四諦十二緣文有八科法門亦可歎三人初四科歎通教人次三假歎別教人三空下歎圓教人又初四科歎通法假等下共歎別圓也初即為四今初歎有為無為功德有為舉智德無為約斷德若就境論道諦是有為滅諦是無為施物名功歸己曰德故名功德無學十智下次歎智差別言十智者一法智即欲界繫法中無漏智欲界繫因中無漏智欲界繫法滅中無漏智為斷欲界繫法道中無漏智及法智品中無漏智是也二比智於上二界道中無漏稱智中約四諦辨四種無漏智如上法智中明但有法比之殊也三他心智知欲色二界繫現心心數法及無漏心心數法少分名他心智也四世智知諸世間有漏智慧也亦名等智凡聖同有故五苦智觀五陰無常苦空無我也六集智有漏法因因集生緣觀時無漏智七滅智盡滅玅出觀時無漏智八道智道正跡乘觀時無漏智九盡智見苦已斷集已證滅已脩道已等智論云我見苦已斷集已盡證已脩道已也十無生智見苦已不復更見等也諸經或云十一智智度為如實智知一切法總相別相如實正知無有罣礙是為如實此獨在佛心中有二乘無分故但云十智也有學八智者是那含人在脩道位中無盡無生智故但有八也有學六智者謂見道中但有四諦及法比等六智也三根者次歎三根德若脩行次第應先辨三根後辨十智今先說果後明因也一未知欲知根無漏九根和合信法二行人於見道中名未知欲知根九根者謂信等五及喜樂捨意等是也二知根信解見得人思惟道中是九根轉名知根如前說三知已根若至無學道中是九根轉名知已根云云十六心行者次歎十六觀門從心之所行故名心行非心即行也依脩行次應在十智前明亦先說果也又只離四諦為十六行行以往趣為義脩此十六觀法能趣四實之理故名行也苦下四行一無常二苦三空四無我集下四行一集二因三緣四生滅下四行一盡二滅三玅四出道下四行一道二正三跡四乘又法忍等十六行也此約通說若地前四十位為四十地為十等覺玅覺為十六此約別說云云法假虗實觀下次歎三假觀門法假者色陰法是也受假者四陰是也取此二名是名名假自實無體藉他方有是名為假又色陰是法受等是名一切世間中但有名與色而今有三別說也云云言虗實者一虗二實相形得稱陰法是虗凡夫謂實智欲了知求不可得只實而虗名為虗實此通意也若說別義者三假之中各有三觀法假即虗是空觀空即假實一色一香無非般若是假觀觀之一字是中觀以空假是方便道故不立觀名得入中道方獨稱觀受及名等類此可解若圓說者三法即空即假即中雙炤雙亡是也云云智度論云諸法非實凡夫虗假憶想分別妄謂有人如狗臨井自叱其影水中無狗但有相影而生惡心投井而死眾生亦爾四大和合名之為身因緣生義動作語言凡夫於中妄起人相此法假也生愛恚起愚樂墮三惡道此受假也又一切法但從名字和合更無餘名如頭足腹脊和合故假名為身如髮眼耳鼻口皮骨和合故假名為頭諸毛和合假名為髮分分合故假名為毛諸泥塵和合故假名為分亦和合諸分故名為塵此即名假也以此假故一切法空三空等者次歎三昧德以三假因緣故得三空名此因果次第說也以法假故空受假故無相名假故無作故大論云因三十七品趣涅槃門涅槃門有三謂空無相無作等言空門者觀諸法無我我所諸法從因緣和合而有無有作者無有受者是名空門無相門者觀身雖空而有相在人著此相故脩無相如說俯仰屈伸住立去來觀瞻言語於中無實風依識故有所作者是識滅相念念無故此男女有我心無智慧故妄見有骨鏁相連皮肉相覆機關動作如木人此無相門也無作門者無相亦無是名無作此三定諸禪中若無不名三昧以退失故墮生死中如說能持淨戒名比丘能觀空名行空人一心常勤精進者是名真實行道人此三能到涅槃得三解脫門云云四諦十二因緣者次歎諦緣此二有同有別同是聲聞斷見思故名同利鈍有殊廣略數異故名別四諦鈍根者觀大經有四種四諦生滅藏教今所不說此經具三教有三種四諦所謂無生無量無作等也苦等四法審實不虗名之為諦若苦集是有漏滅道是無漏此三藏也若四俱無漏是通也若四俱亦有漏亦無漏是別也若四俱非漏非無漏是圓也十二因緣利鈍者觀如大經中亦有四種於四種中各各有三別一者三世十二因緣二者二世三者一世廣如餘說云云五總結無量功德皆成就可知二列緣覺眾復有八百萬億大仙緣覺非斷非常四諦十二緣皆成就文四一唱數二標位三歎德四結成初文可知大仙緣覺者二標位也有三差別一者獨覺如昔有國王入園遊觀清旦見樹林華果甚可愛樂時王食已即便偃臥王諸婇女皆競採摘毀壞林樹時王覺已即悟一切諸法無常若是以外況內成大仙緣覺二者因緣覺出於佛世聞十二因緣斷見思惑三者小辟支佛是須陀洹人在人間生是時無佛佛法已滅人中七生天上亦爾不受八生自悟成道即成小辟支佛也非斷非常者三歎德也過去二因牽識等故非斷識等滅故二因不生故非常又三世相續故非斷無自性故非常又順則生死無際故非斷逆則無明燋竭故非常四諦十二緣下四結成也問前列聲聞亦云諦緣今歎支佛更復重明後列菩薩仍云羅漢者何耶答於一境上取悟自差三獸度河三鳥出網河同獸異網一鳥殊故大經云下智觀故聲聞菩提中智觀故緣覺菩提上智觀故菩薩菩提上上智觀故諸佛菩提良以理一見殊所以諦緣互說云云問緣覺出無佛世今云何列為同聞眾答緣覺佛在世亦有只在聲聞中攝言出無佛世者此對聲聞非謂佛世總無緣覺也第二列菩薩眾復有九百萬億菩薩摩訶薩皆阿羅漢實智功德方便智功德行獨大乘四眼五通三達十力四無量心四辨四攝金剛滅定一切功德皆成就文五一數二號三位四德五結初文可知菩薩摩訶薩者二標號也菩薩此云道心眾生摩訶薩此云大道心亦云大士亦云開士若以生滅心行六波羅蜜三祇成佛此三藏教中菩薩心勝聲聞道卑羅漢若以無生心斷見思惑留餘習扶願受生十地行圓當知如佛此通教中菩薩也若以無量心行無量行淨佛國土成就眾生大慈不窮大悲無限華臺摩頂成功德身此別教中菩薩也若以無作心觀煩惱菩提生死涅槃無二無別非成不成此圓教中菩薩也今此所列正列通教密兼別圓云云皆阿羅漢者三明位也若三藏中佛即是羅漢故本行云爾時世間有六羅漢五是陳如等五人一即是佛也若通教中三乘共行十地七地菩薩即阿羅漢若別教中十向菩薩斷三界惑盡齊阿羅漢若圓教中十信菩薩斷三界惑盡亦齊羅漢今皆阿羅漢者即通教菩薩大品云阿羅漢若智若斷是菩薩無生法忍大集亦云大法菩薩名阿羅漢問若皆阿羅漢前已辨竟今何更明答以菩薩形無定準或同凡像或同二乘若不別明恐於實混濫庶幾貴小乘者知大士德齊羅漢取名相者悟知菩薩道越凡夫故更別說也實智功德下四歎德中先歎智德實智則照空方便智炤有有實智故不住生死有方便故不住涅槃向者明位雖云羅漢今此歎德即異二乘故別說也通教菩薩七地中具實智八地已上具方便智云云行獨大乘者次歎乘二乘無分故名獨大此歎別教菩薩也四眼者次歎眼菩薩行既未圓義當無佛眼也通教當知如佛義推之眼亦如佛圓教十信雖是肉眼名為佛眼今云四眼者即別教地前菩薩也五通者次歎通具天眼等五除漏盡通通教未斷無明別教斷猶未盡故但云五也云云三達者次明過去宿命明現在天眼明未來漏盡明明即達也十力者次歎力智論云菩薩十力一發心堅固力二大慈力三大悲力四精進力五禪定力六智慧力七身不厭生死力八無生法忍力九解脫力十無礙力也四無量心者次歎心慈能與樂悲能拔苦喜與眾生增上之樂如上三心捨之不著云云四辨者次歎辯法辭樂說義等是也四攝次歎攝布施愛語利行同事等也金剛滅定者次歎斷十地上忍定如金剛碎煩惱山自不傾動亦名首楞嚴定云云一切功德下五總結也第三列雜類眾以其中名色非一故言雜類二一別二總別中四一人二士三天四仁王人更二一男二女今初復有千萬億五戒賢者皆行阿羅漢十地迴向五分法身具足無量功德皆成就文四一數二名三德四結初標數可知五戒賢者次列名也五者是數義戒者防止義梵云優婆塞此云清信男於佛法中非淨信心故又云近事男以依三寶親近師長承事無失故離殺盜婬此三防身業妄語一戒防口業飲酒一戒通防二業廣釋戒相如大論尸波羅蜜說云云提謂波利等問佛何不為我說四六戒佛答五者天下之大數在天即五星在地即五嶽在人為五臟在陰陽為五行在王為五帝在世為五德在色為五色在法為五戒以不殺配東方東方是木木主於仁仁以養生為義不盜配北方北方是水水主於智智者不盜為義不邪婬配西方西方是金金主於義有義者不邪婬不飲酒配南方南方是火火主於禮禮防於失也以不妄語配中央中央是土土主於信妄語之人乖角兩頭不契中正中正以不偏乖為義也道將鄰聖曰賢假名行人位也皆行阿羅漢下三歎德也雖迹同凡夫而本皆羅漢十地者有三種若菩薩二乘共行此通教也一乾慧二性地三八人四見地五薄地六離欲七已辦八支佛九菩薩十佛地依此十地則是通教中優婆塞也大品經云若菩薩具乾慧地於十地速證菩提云云大論七十八云乾慧地二種一聲聞二菩薩聲聞獨為涅槃故勤精進持戒等或習觀佛三昧不淨觀等雖有智慧不得禪定水故名乾慧地於菩薩則初發心乃至未得順忍者是性地者聲聞從煖至世第一於菩薩得順忍愛著實相不生邪見得禪定水八人地者從苦法忍乃至道比忍是十六心於菩薩則無生法忍入菩薩位見地者初得須陀洹果於菩薩則是阿毗䟦致地薄地者斯陀含人欲界九種苦分斷故於菩薩則過阿毗䟦地乃至未成佛斷諸煩惱餘習氣亦薄離欲地者離欲界等貪名阿那含於菩薩離欲因緣得五神通已辦地者聲聞人得盡無生智無著阿羅漢於菩薩成就佛地辟支佛地者先世種辟支佛道因今世得小因緣亦觀深因緣法名支佛也菩薩地者初歡喜地乃至法雲地皆名菩薩此借別名名通也佛地者一切種智等法諸菩薩於自地中觀具足於化他地中行具足二事具足故名佛地若別教即初地終至法雲獨自脩行不與聲聞辟支佛共準此則是別教中優婆塞也圓教云云迴向五分法身具足者別接通空以別初地接通教令不滯界內即色之空迴心向別斷界外無明成就五分法身故歎迴向也言具足者通教偏真五分等是不具足別圓中道正觀成就五分方稱具足也五分法身者一戒身二定身三慧身四解脫身五解脫知見身問菩薩所作何故迴向答迴向之利其功最善故淨名云迴向為善利迴向二種一者所作迴施眾生二者所作迴向佛果也云云無量功德下四總結也第二列清信女復有十千五戒清信女皆行阿羅漢十地皆成就始生功德住生功德終生功德三十生功德皆成就文三一數二名三德今初可解清信女者二標名也梵云優婆夷此云清信女皆行阿羅漢下三歎德亦通別中優婆夷也文二先總歎十地可解次始生下別歎十地中功德又二今先正歎一地三心從第十迴向始有初地所得功德是初心停住不進所得功德是住心滿足功德欲入二地是終心法華亦云善入出住等云云三十生功德下次結也第二列居士眾復有十億七賢居士德行具足二十二品十一切入八除入八解脫三慧十六諦四諦四三二一品觀得九十忍一切功德皆成就文四一數二名三德四結今初可知七賢居士者二標名也七賢有二一小乘五停心觀等是也二大乘一名初發心人二名有相行人三名無相行人四名方便行人五名習種性人六性種性人七道種性人俱在地前調心順道名為七賢居士者外國積財至億名為居士今此富有七淨財故名居士信施戒聞慧慚愧名七淨財也云云德行具足下三歎德謂具足諸德之行名德行具足二十二品者此歎道品以在見道前唯有四念處四正勤四如意足五根五力二十二品也十一切入者次歎十遍處入者處也青黃赤白地水火風空處識處名之為十云云八除入者次歎勝處一內有色相觀外色少二內有色相外觀色多三內無色相外觀色少四內無色相外觀色多五青六黃七赤八白云云八解脫者次歎解脫一內有色相外觀色二內無色相外觀色三觀淨色四空處五識處六無所有處七非有想非無想八滅受想解脫問觀未得聖云何今歎八解脫答八中得七未得滅盡今從多而歎也問解脫以何為義答解脫以棄背為義初二棄背色貪心第三棄背不淨觀心四無色棄背下地心滅盡令棄背一切所有緣心問解脫勝處遍處何別答有棄背名解脫能降境界名勝處能廣能勝境名遍處云云三慧者次歎慧謂聞思脩初是乾慧地次是四善根苦忍已上名脩慧十六諦者次歎觀門如前說云云四諦者次歎諦門亦如前說云云四三二一品觀者次歎四門即四觀忍也從下舉之煖第四頂第三忍第二世第一法第一四即四善根三即除煖位二除煖頂一除前三也又四即四果三即三果二即二果一即初果此非歎意今取前釋得九十忍者四結文二先別結次總結今初有人云地前三賢三十心一一中作下中上或八住出等三品觀合九十忍也有人云四三二一合成十忍約三界九地一一地中各有九品成九十忍又云諦觀二十謂十六諦及四諦品觀有十謂四三二一總成三十各有下中上三品成九十忍也今謂九十忍者是別結經文中德不可眾多作異說也但說具足二十二品下至四三二一數有八十一品從此等法出四禪四空滅定合九十忍經雖無四禪等文義推可爾云云一切功德皆成就次總結也第三列天眾二先列色次列欲今初復有萬萬億九梵三淨三光三梵五喜樂天天定功德定味常樂神通十八生處功德皆成就文四一數二處三德四結今初以萬數萬故云萬萬億也九梵下二明處此經三本不同有一本云復有萬萬億十八梵天九梵三淨三光五喜樂天又一本中但云三淨三光五喜樂天又一本除五字初除十八梵天四字後但有三字無梵字葢譯者出沒耳言九梵者謂第四禪九天一無雲二福生三廣果四無想五無煩六無熱七善現八善見九色究竟也三淨者是第三禪有三天謂少淨無量淨遍淨也三光者是第二禪有三天謂少光無量光光音三梵者謂初禪三天梵眾大梵梵輔也五喜樂天者即五支謂覺觀喜樂一心等也是四禪中後五淨者此天義論受喜樂故也云云天定功德定味者三歎德天定者謂報生天上得此定功德定者謂脩得生天而有此定味者一字為句即是味著禪定也有人云功德定味為句非也常樂神通者色界天中皆有脩報二種神通也言常樂簡非報得神通也十八生處下四總結云云二列欲界復有億億六欲諸大天十善果報神通功德皆成就文四今初明數六欲諸大天者二明處此六天中有小五欲從初四天至他化自在為六也十善等者三歎德也十善是因生天是果報也功德皆成者四結也第四列仁王復有十六大國王各各有一萬二萬乃至十萬眷屬五戒十善三歸功德清淨行具足文四一數二眾三德四結今初云十六國王者舉國數以標人也各各有下第二明眾也五戒下三歎德也德有三一戒二善三歸清信行具足者四結四信成就故云清信也第二總列復有五道一切眾生前別中但明天人今則通明五道脩羅等或鬼或畜故但云五道也又六道中天人先有三惡之內或有或無此經無緣故總云五也此土眾竟第二列他方眾復有他方不可量眾他處異見云云第三列化眾復有變十方淨土現百億高座化百億須彌寶華各各座前華上復有無量化佛無量菩薩比丘八部大眾各各坐寶蓮華華上皆有無量國土一一國土佛及大眾如今無異一一國土中一一佛及大眾各各說般若波羅蜜文三今初明不思議力能變淨土淨土者非寂光之淨且現華臺實報等淨相也現百億高座及華者且明應身大千之化相也各各座前下二明不思議力能現諸佛菩薩八部者乾闥婆毗舍闍二眾東方提頭賴吒天王領鳩槃茶薜茘多二眾南方毗留勒叉天王領龍富單那二眾西方毗留博叉天王領夜叉羅剎二眾北方毗沙門天王領云云一一國土中下三明不思議力各說般若等上來列眾竟第二總結他方大眾及化眾此三界中眾十二大眾皆來集會坐九級蓮華座其會方廣九百五十里大眾僉然而坐他方大眾即結前來第二他方眾及化眾即結前第三化眾三界中眾即結前此土眾十二大眾皆來集會即總結前三眾差別果一聲聞二緣覺三菩薩四五戒賢者五清信女六七賢居士七色天八欲天九仁王十五道十一他方十二化眾是也坐九劫座者結座劫者級也級者層也其會下結眾廣狹也問諸經列眾或有或無何耶答若說報生三界由善惡業力見佛不見佛由有緣無緣即有生天受樂至不聞經乃至地獄燒燃而來聽法今以大經之義試為斷之大經云於戒緩者不名為緩於乘緩者乃名為緩總相明之乘即戒也今約別說乘戒二殊即以三歸五戒十善八戒二百五十五百戒等名之為戒念誦脩行禪智施進等名之曰乘然戒與乘各有三品乘有小中大戒有上中下若乘戒俱急者又有三品如持上品戒急生無色界天下品乘急以無色天身聞佛說聲聞法中品乘急聞說因緣上品乘急聞說中道等若持中品戒急生色界天下乘急聞說四諦中乘急聞說因緣上乘急聞說六度若持下品戒急生欲界天下乘急聞小乘中乘急上乘急準上說若戒乘俱緩者上品戒緩墮地獄中品緩墮畜生下品緩墮餓鬼以乘緩故永不見佛何況聞法若戒緩乘急者得見佛聞法上品戒緩生地獄中下乘急以地獄身聞說四諦中乘急聞因緣上乘急聞六度云云若戒急乘緩者三品戒急得三界身以乘緩故著人天樂不得見佛況得聞法今無無色界天眾者以上品戒急大乘緩故此經無緣故不來也餘經有無例此可解上來證信序竟第二發起序文五一佛自現瑞二時眾生疑三覺悟如來四佛昇華座五大眾歡喜初中更五一讚佛德二明現瑞時節三正住十地四入寂定五思緣現瑞今初爾時十號三明大滅諦金剛智釋迦牟尼佛爾時者當爾之時也十號者教主之德德凡有四一十號德二三明德三斷德四智德今初言十號者一是如來二應供三正遍知四明行足五善逝六世間解七無上士八調御丈夫九天人師十佛世尊是十號之數也云云次歎三明德以明鑒三世也次歎斷德謂大滅諦簡非小滅故言大也金剛智者次歎佛智德釋迦牟尼佛者上明通號及德今明別號也然佛種姓出處不同或姓剎利或婆羅門今姓釋迦者此云能仁如長阿含說昔梵摩穀王四子有過徙向雪山令自存活四子至彼民歸如市王歎四子我子能仁能自存活因此姓釋佛第四祖已來始姓釋也本姓瞿曇或甘蔗種或日種或牛糞種云云牟尼者名也此云寂默三業但寂默也二明現瑞時節初年月八日真諦云如來在世四十五年說三法輪謂轉照持然此三輪有顯有密密則從得道夜至涅槃夜俱三轉法輪顯則初成道七年但轉轉法輪七年後三十一年中輪照法輪三十八年後七年中轉持法輪從轉轉法輪來有三十年前至二十九年已說餘般若今至三十年初月八日方說仁王故言初年月八日此則佛成道三十七年說此經乃年七十二歲也云云三正住十地方坐十地方者正也正坐佛之十地非菩薩十地又佛以別接通坐別十地欲密顯通教十地正令悟別地故云方坐也佛十地者同性經云一甚深難知廣明智德地二清淨身不思議地三海藏地四神通智德地五明德地六無垢涅槃炎光開相地七廣勝法界藏明界地八無礙智慧地九無邊億莊嚴迴向能照明地十毗盧遮那智藏地四入寂定入大寂室三昧欲觀察物機授法藥故又令知因定發慧故又作說法儀軌故佛具智斷尚自觀機況於凡夫而不審諦云云大寂室者即大涅槃也大經云涅槃深禪定窟窟即室義法華大通智勝佛亦入靜室與此義同也又大寂者即動是寂室者即寂而照大寂是法室是喻如室虗能受萬物般若空理能含多義也約觀者室是一法空亦無二明暗自殊室空不別明喻智慧暗喻煩惱室喻人身空喻心識日出則室空俱明喻智生身心俱淨日入則室空俱暗喻智滅則身心俱穢穢淨雖殊而性常清淨故淨名云無明性即是明一切眾生即菩提相不復更滅此即證也第五思緣現瑞思緣放大光明照三界中復於頂上出千寶蓮華上至非想非非想天光亦復爾乃至他方恒河沙諸佛國土時無色界雨無量變大香華香如車輪華如須彌山王如雲而下十八梵天王雨百變異色華六欲諸天雨無量色華其佛座前自然生九百萬億種華上至非想非非想天是時世界其地六種震動思緣放大光明照三界中下有本云照三界眾生也文五一思緣放光二頂上出華三諸天雨華四佛自生華五大地振動今初思緣者思於無相緣於法性自受大樂也光照三界中覺化境也問無色界無色陰何故照之答雖無麤色而有細色約二乘凡夫不見言無而實有也復於頂上出千寶蓮華下二頂上出華文三今初出華其華上至下二明豎現乃至他方下三明橫現放光令識智慧之本出華令悟得道之因又光欲化當機眾華令其見作結緣因前列眾中無無色界天者以其戒急乘緩無現益緣今令非相見華使作當來種子也時無色界天下三諸天雨華前教主現相明存感今諸天雨華明有應此則藥病相稱感應道交也無量變者心樹華非生死華也文三初無色界次色界後欲界皆可見色天多禪無色天多定能心樹變華故言變欲天無此但雨實華也其佛座前下四佛自生華向明頂上出華顯正報瑞今佛座前生華明依報瑞劫者層也是時世界下五大地震動放光雨華令其目見動地令其心動心動則煩惱動故大經云大地動者能令眾生心動也動踊覺起振吼等為六又東涌西沒等六也地動八緣如阿含說一大水動時動二尊神試力時三如來入胎時四出胎時五成道時六轉法輪時七眾教時八涅槃時增一經亦有八緣閻浮提風輪從上向下有地水火風從下向上次第動二菩薩入胎三出胎四出家學道成道五入涅槃六神通比丘心得自在七諸天命終還生勝處八眾生福盡相云云動意者十地論云治三種煩惱一生天眾生樂著天報振動天宮令生厭捨起求法心二造惡眾生不識無常縱心蕩意令因地動捨惡從善三我慢眾生或因呪力能小動地起高慢心使見大動知其力劣也第二時眾生疑文三一明眾生疑二申眾疑意三問眾不決今初爾時諸大眾俱共僉然生疑可解二申眾疑意各相謂言四無所畏十八不共法五眼法身大覺世尊前已為我等大眾二十九年說摩訶般若波羅蜜金剛般若波羅蜜天王問般若波羅蜜光讚般若波羅蜜今日如來放大光明斯作何事文三一歎佛德次領前事三騰今事初文二先明成人之德有四一者四無畏德謂一切智無畏漏盡無畏盡苦道無畏說障道無畏云云二十八不共法自有二小乘中謂十力四無畏大悲三念處是三念處者應貪不貪應瞋不瞋常行捨心也大乘者謂身口意無失是三四無異相五無不定心六無不知已捨七欲八精進九念十慧十五解脫十二解脫知見等無減十三十四十五三業道隨智慧行十六十七十八智慧知三世無等二乘無分故言不共三五眼謂肉天慧法在佛身上竝名佛眼云云四法身法身有三一但空法身三乘皆有如善吉七葉巖中禮佛法身此小乘滅三十二相即空為法身也二即假法身謂滅無常色獲常等我樂淨三亦復如是三即中法身謂如來法身非常非無常樂我淨等亦復如是云云大覺世尊下二明德所成人覺中道理名為大覺天人所重名曰世尊前已為我下領前事謂從得道後二十九年說四般若於靈山說大品次舍衛說金剛及天王問後還靈山說光讚及道行具出光讚云云今日如來下第三為今事謂疑前瑞相等也云云第三問眾不決時十六大國王中舍衛國主波斯匿王名曰月光德行十地六度三十七品四不壞淨行摩訶衍化次第問居士寶葢法淨名等八百人復問須菩提舍利弗等五千人復問彌勒師子吼等十千人無能答者文有二一問二眾不決初文二先舉處歎德二明次第舉問初文三一明處依大論憍薩羅國主波斯匿王今云舍衛或云舍婆提城善見律云舍衛者是人名往古有王名為舍衛見地好立以為國因居其地從人得名名舍衛也波斯匿王下二舉名有云王姓月聞法之後更立光名德行十地下三歎德十地六度道品多是通教也信三寶及戒不壞名四不壞淨也行摩訶衍化者以大乘治國也次第問居士下二次第舉問先問俗眾寶是寶積葢是月葢法是法財淨名是維摩詰也次問聲聞後問菩薩云云無能答者下二眾所不決云云第三覺悟如來時波斯匿王即以神力作八萬種音樂十八梵天六欲諸天亦作八萬種音樂聲動三千乃至十方恒河沙佛土有緣斯現彼他方佛國中南方法財菩薩共五百萬億大眾俱來入此大會東方寶柱菩薩共九百萬億大眾俱來入此大會北方虗空性菩薩共百千萬億大眾俱來入此大會西方善住菩薩共十恒河沙大眾俱來入此大會六方亦復如是作樂亦然亦復共作無量音樂覺窹如來文三一明此土設樂覺悟如來二他方三共設今初文二一三類設樂謂月光梵天欲天二聲動世界先一佛世界次十方世界云云彼他方下二明他方文二一來集二作樂初中先明四方次列六方作樂亦然者二明作樂也云云復共作下三共設樂亦是前佛現瑞明能應今時設樂明有感即覺悟如來也云云第四明佛昇華座佛即知時得眾生根即從定起方坐蓮華師子座上如金剛山王佛昇華座即是如來赴感也又佛現瑞即良醫也時眾設樂即病人求救也佛昇華座即醫人授藥也云云又放光是身業入定是意業即從座起說空觀是口業又放光動地神通輪入定得眾生根是他心輪說空觀品是說法輪師子座者大論云非是實師子亦非木石師子以如來是師子所生之處若床若座皆名師子床座也如金剛山王者金剛喻佛四德法身一切不能沮壞山王即須彌山喻佛也不為八風所動又華座皆是現實報土如山王是現尊特身亦別接通也云云第五大眾歡喜大眾歡喜各各現無量神通地及虗空大眾而住有通者在空無通者居地上來序分竟
