body:
  text: 鍥仁王般若經合疏敘仁王般若疏安史之亂橫罹兵燹中原絶其傳至宋初四明祖師多方求之卒不克獲嘗傳于吾扶桑師授相傳而講究亦聞豈此疏與吾特有因緣邪將吾之士信道之篤守而弗失歟然經疏各行艱乎尋對且亥豕相望句讀難分邇世以來疏本僅傳而講究稍疏想非斯之故歟余嘗竊欲分會校訂以便學者而事緣為阻未酬素志頃日劂生持一方册題曰仁王般若合疏者來請余辨言焉余取覽之則閩為霖霈公之所合而訂正稍精嗚呼余嘗所欲為而未果者況經先達之表章豈惜鄙辭而不表隨喜之忱哉於是乎書元祿壬午春二月下浣天台山亮潤大雲序合刻仁王護國般若經疏序昔天台智者大師廣説諸疏皆已廣行震旦獨仁王一疏流落海外凡數百載至宋藉賈客之力始還本土亦弗克大行于世僅祕之龍藏而已近因國運式微災變迭至本照上人深抱杞人之憂乃鏤仁王經板印行普勸持誦繼而為霖上人又謂經義幽遠非疏莫通乃取天台舊疏合之夫此疏傳自陳隋已千有餘載而若存若亡不能大顯于世雖老師宿學鮮有得一見之者今二子乃能舉行於四海鼎沸蒼生塗炭之秋是知此疏與末劫衆生有大因緣故龍天借其力以流通之歟但願人人因疏而通經因經而達理則般若神力靡所不破亦靡所不護而佛果菩薩且賴之成立況國土乎況生靈乎或者謂治亂循環天之所命閉門誦經前人敗德今又何取於此余謂治亂固繇天命天命實本人心故人心者治亂之源也非獨釋氏侈談此旨即遠稽儒典若大易若洪範亦備載之豈可盡委之天命而無造命之術哉誠能深味此經之旨則造命無遺術矣知命君子請於茲三致意焉時崇禎甲申年孟夏下浣鼓山嗣祖沙門元賢題于寶善丈室仁王護國般若經疏序朝請郎飛騎尉賜緋魚袋朝説之撰陳隋間天台智者遠稟龍樹立一大教九傳而至荊溪荊溪後又九傳而至新羅法融法融傳理應應傳瑛純皆新羅人以故此教播於日本而海外盛矣屬中原喪亂典籍蕩滅維此教是為不可亡者亦難乎其存也然杲日將出而曉霞先升真人應運而文明自見我有宋之初此教乃漸航海入吳越今世所傳三大部之類是也然尚有留而不至與夫至而非其本真者仁王經疏先至有二本衆咸斥其偽昔法智既納日本信禪師所寄辟支佛髮答其所問二十義乃求其所謂仁王經疏信即授諸海舶無何中流大風驚濤舶人念無以息龍鼉之怒遽投斯疏以慰安之法智乃求強記者二僧詣信使讀誦以歸不幸二僧死于日本至元豐初海賈乃持今仁王疏三卷來四明於是老僧如恂因緣得之其文顯而旨微言約而意廣以秦譯為本義勢似觀心論疏實章安所記智者之説也恂道孤而寡偶學古而難知食貧而力不足無以為此經毫髮之重每指而嘆曰其來晚學而艱如此寧封野馬而飽蠹魚不能下几案以視人嗚呼此疏曾不得輩行於三大部中而匿光痊彩猶若海外之遠歟恂今年七十有六歲乃一日抱之而泣曰殆將與吾俱滅邪吾前日之志非也遇嵩山朝説之曰曷不為我序而流通之説之自顧何足以與此亦嘗有言曰智者若生齊梁之前則達磨不復西來矣盡法性為止觀而源流釋迦之道囊橐達磨之旨今方盛於越中異日會當周於天下豈獨是書之不可掩哉顧豫老不及見之為恨姑序其所自云爾政和二年壬辰四月癸卯序仁王般若經合疏目次卷之上序凡例科序品第一卷之中觀空品第二菩薩教化品第三卷之下菩薩教化品之餘二諦品第四護國品第五散華品第六受持品第七囑纍品第八仁王般若經合疏目次終合仁王經疏凡例經疏異帙者古制也以割裂聖經恐簡褻故然而猶割裂者有二意一異帙者封閉藏中能探討者有幾人今合為一帙使窮陬僻壤皆得見故二異帙者經疏不相聯屬非宿學未易尋繹今合為一帙使讀者繇科以入經繇經以入疏繇疏以會理綱目整齊脈絡調鬯雖蒙學之士亦可遡流問源也是則功大而過小故合之疏中諸科或有標而無結或有結而無標者良以歷年既遠刊寫者脫誤今據其所當有者前後互相補之疏中或有疑誤及字畫亥豕者竊為訂正然必考諸經對諸記平準諸心衡以求歸於至當之域且又嘗請證諸老師宿衲蓋不敢妄有增損云古疏既未與經合其提經處但標某句下今既合經入疏列疏於經下其某句下數字悉刪去以免繁重之咎間有合若干子科於一段經文之內者則姑存之以便知其斷節蓋欲省列煩細諸科故此疏科段雖已分明而科目未嘗提出且散在經文之下不便檢閲今依諸疏舊例以全科總列圖於前脈絡井然序次弗亂庶幾觀者可一覽而盡宋紹定間有善月法師撰神寶記以通疏今疏文間有肯綮難解者略引一二或記有所未詳則又竊附管見并細書頂上或問子欲弘通是經不自別出手眼而僕僕於古注是引得無拾昔人糟粕乎曰不然東土釋經天台為最一經櫽栝千古遵承矧此疏失而後得其得之又如此之難字字珠玉罔不可珍雖謂今人未必不如古人而古人有必不可及處所以今人竭盡伎倆不出古人範圍也豫豈好古而病今者哉亦識法者懼耳仁王護國般若波羅蜜經疏科仁王經疏科文分二一經前玄義五一釋名二辨體三明宗四論用五判教二入文解釋三一序分即序品二一證信序六一所聞法體二能持阿難三聞持和合四説教之主五説教之處六同聞之衆二一列衆三一此土衆三一聲聞衆二一聲聞五一通號二列數三行位四歎德五總結二緣覺二菩薩衆三雜類衆二一別四一人二一清信男二清信女二士三天二一色天二欲天四仁王二總二他方衆三化衆二總結二發起序五一佛自現瑞五一護佛德二現瑞時節三正住十地四入寂定五思緣現瑞二時衆生疑三一明衆生疑二申衆疑意三問衆不決三覺悟如來四佛升華座五大衆歡喜二正説分中間六品三流通分即屬纍品第二正説分四一明內護前三品二初略開二護二問答廣釋二先問次答三一明自利行觀空品二一正釋觀空二一正釋二初標宗正釋二初正釋二一所化境二能化智三初約法二解釋三結成二結行二問答重釋二初明三般若三初實相般若二先問次答二一明真則無化二明俗則有化二觀照般若二先問次答二先略次廣二初正廣釋二先明法空性空二歷法明空二先正明後釋成空義二初就識陰次例四陰二明能觀之智雙照空有二先明觀照二一照空二一明照相二明空分齊二照有次明得失二初明邪觀二明正觀二一明行二明位三文字般若五一明多佛共説二舉喻三格量四舉況五明信解相二依教發觀二初明邪觀二明正觀二初約染淨因果以明空相二初明生死空二初正明生死二辨空所由二明佛果空二約無聽説以明空相二總結二時衆得益二明利他行教化品三明二護所依二諦品二明外護即護國品三明報恩供養即散華品四明弘經相貌即受持品二明利他行教化品二一發問二佛答二初答前二問三初正答二問二一正答前問兼利他三初略答二廣答五初伏忍三一十住二十行三十回向二信忍三順忍四無生忍五寂滅忍文四初標名位二辨除障三約諦辨異四攝化分齊二初略二廣後作依宗廣釋三總結二正答後問兼自利二先問後答二先略後廣三初標次釋十一善覺地二離達地三發光地四炎慧地五難勝地六現前地七遠行地八等觀地九善慧地十法雲地後結次月光偈讚後如來述成次答第三問二月光偈讚三一時衆供養二月光讚佛二一明讚處二正發言讚三一總頌上義三初歎別相三寶二歎五忍三歎一體三寶二別歎十四忍五初頌伏忍二初頌伏忍方便二先明離過次明攝位二頌伏忍功德二初別歎三品為三輪王次總歎三品二初列三十心次正歎功德二頌信忍二先頌三品三一頌初地下品二頌二地中品三頌三地上品後結歎三頌順忍二初正頌三初四地下品次五地中品後六地上品後總結四頌無生忍三初頌七地下忍二初釋行相二斷惑分齊次頌八地中忍後頌九地上忍五頌寂滅忍二初頌十地下品二頌妙覺上品三結頌五忍三一歎淨土果二歎法身果三歎利益果三大衆得益第三如來述成二初讚能説二先正讚後述讚後讚所説三初正讚三初釋不可思議三一略説次假徵二藏後廣釋三初就佛明不可思議二合釋二藏明不可思議二先釋二初人法相對明不思議二初明人空二明法空二境智相對明不思議二初辨境空後釋智空後結三雙結二藏明不可思議二釋不可度量三釋唯佛能知二勸修三初正歎觀修二徵三廣釋三大衆供養次答第三問即所化衆生之相三初牒問二正答二一略二廣二一明所化如幻二先釋六一釋法假二一正明法假二一明本識能生色心二明色心成陰界二初成五陰二明成十二處二明凡聖境差二明受假三釋名假二一明佛前無名二明佛為立名四明相續假五釋相待假六釋因生假後結二明能化如幻三得益即時得益衆第三明二護所依二諦品二一問答三一明二諦不二二先問次答三一正答二引證三初正伸二諦次釋義三結成上義三釋成二先明二義後明一義三初能所相對明一義二境智相對明一義三染淨相對明一義二明説法不二二先問次答二一明説空二明修空三初辨修習二逐歎重釋三結修成三明法門不二二先問次答三一略答二廣答三結答二勸持二一歎教二舉名勸持第二明外護即護國品三一誡聽勸持二廣釋三一廣釋護法三一護國四一護時二護法三初明福田次明供養後明説三護體四顯所護二護福三護難二引古證今二先引天證護國後引人證護身二一明難事二明能護難三一請修福二聽許三正明護難二初長行依教請護二説偈加護二一説偈四初説無常理二説苦理三説空理四説無我理二獲益三結示勸持三時衆得益第三報恩供養即散華品三一散華供養三一聞經勸持二散華供養三一行華二般若華三妙覺華三諸王發願二佛現神變二先現變後得益三歎教勸修第四示弘經相貌即受持品三初問答須受持二一月光請二如來答三初總標次別釋十三一習種性法師五一標位二辨差三行業四舉劣況勝二先舉劣後況勝五入位時節二性種性法師三十回向菩薩已上三位三賢第四法師即初地五初標位二辨修行差別二初顯二諦為相二先標章次別釋二先釋實智次釋方便智二顯二諦同異三明時節四明生淨土五明登位第五法師二地第六法師三地第七法師四地第八法師五地第九法師六地第十法師七地第十一法師八地第十二法師九地第十三法師十地四一標位二明證時分三對位辨差五一伏斷差別二信見異三漸頓差別四常無常異五等無等異四明入定位後總結二付王受持四一讚用勸持二一略二廣二初標除難福生二問答分別二讚名勸持二先讚名勝後勸供養三釋勸所由四稱名付囑三時衆得益五一修羅益二人王益三天益四大衆益五菩薩益第三流通分囑纍品二先付囑誡敕二先略付囑二廣付囑誡敕二初明付囑二先付時二明付人法二廣辨七誡七一誡諸滅法過三初明滅法人次辨滅法過後結成過二誡壞四衆行三誡禁不依法四誡自毀三初自毀二起惡三招報五誡使役六誡自咎七誡謬信二大衆奉持二先奉持次奉行仁王經疏科文終
